name: FlashMLX
options:
  bundleIdPrefix: com.flashmlx
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  FlashMLX:
    type: application
    platform: macOS
    sources:
      - path: FlashMLX
    settings:
      base:
        INFOPLIST_FILE: FlashMLX/Info.plist
        CODE_SIGN_ENTITLEMENTS: FlashMLX/FlashMLX.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.flashmlx.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
